name: AVSysMaster
options:
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.avsysmaster.control
    PRODUCT_NAME: AVSysMaster
targets:
  AVSysMaster:
    type: application
    platform: iOS
    info:
      path: AVSysMasterApp/Info.plist
    sources:
      - path: AVSysMasterApp
        excludes:
          - "**/*.md"
    resources:
      - AVSysMasterApp/Localization
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: W7MKR6RKKG
